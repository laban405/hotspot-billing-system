services:
  hotspot-api:
    container_name: hotspot-api
    image: laban405/hotspot-api:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb+srv://mordexat123:dUBb4KGtg31LlLA9@labanshop2025.kjpjc0o.mongodb.net/hotspot?retryWrites=true&w=majority&appName=LabanShop2025S
      BASE_URL: http://localhost:3000
      MPESA_CONSUMER_KEY: 706TlPBBm3VYoRS67tNGdmG8lB4RWvuYQfVthWYWsm6bnQde
      MPESA_CONSUMER_SECRET: wfJthGEfBcLw7aPAblKkkyAnGNLxAOATMBlgpUErZQFjZAQZNY6zfu157bBYK6wO
      MPESA_SHORTCODE: 5506814
      MPESA_PASSKEY: e5eeb5f62f214eda35c77f9c37442e7f49b5ee89f5417c14f0f8e9567f064a99
      VIRTUAL_HOST: api.hotspot.mikrosell.com
      LETSENCRYPT_HOST: api.hotspot.mikrosell.com
      VIRTUAL_PORT: 3000
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  radius-db:
    container_name: radius-db
    image: mariadb:11.4
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MARIADB_DATABASE: radius
      MARIADB_USER: radius
      MARIADB_PASSWORD: Laban4439@
      MARIADB_ROOT_PASSWORD: Laban4439@
      TZ: Africa/Nairobi
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - radius-db-data:/var/lib/mysql
      - ./radius-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  freeradius:
    container_name: freeradius
    image: laban405/hotspot-freeradius:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      radius-db:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    environment:
      RADIUS_DB_HOST: radius-db
      RADIUS_DB_PORT: 3306
      RADIUS_DB_NAME: radius
      RADIUS_DB_USER: radius
      RADIUS_DB_PASSWORD: Laban4439@
      RADIUS_SHARED_SECRET: Laban4439@
      RADIUS_CLIENT_NAME: laban-mikrotik-rb951
      RADIUS_CLIENT_IPADDR: your-mikrotik-radius-ip
      RADIUS_CLIENT_SHORTNAME: lb951
      RADIUS_NAS_TYPE: mikrotik
    volumes:
      - radius-logs:/var/log/freeradius
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  radius-db-data:
  radius-logs:
