services:
  hotspot-api:
    container_name: hotspot-api
    image: ${HOTSPOT_API_IMAGE:-laban405/hotspot-api:latest}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      BASE_URL: ${BASE_URL}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      VIRTUAL_HOST: ${HOTSPOT_API_HOST}
      LETSENCRYPT_HOST: ${HOTSPOT_API_HOST}
      VIRTUAL_PORT: 5000
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  radius-db:
    container_name: radius-db
    image: mariadb:11.4
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MARIADB_DATABASE: ${RADIUS_DB_NAME}
      MARIADB_USER: ${RADIUS_DB_USER}
      MARIADB_PASSWORD: ${RADIUS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${RADIUS_DB_ROOT_PASSWORD}
      TZ: ${TZ:-Africa/Nairobi}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - radius-db-data:/var/lib/mysql
      - ./radius-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  freeradius:
    container_name: freeradius
    image: ${FREERADIUS_IMAGE:-laban405/hotspot-freeradius:latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      radius-db:
        condition: service_healthy
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    environment:
      RADIUS_DB_HOST: radius-db
      RADIUS_DB_PORT: 3306
      RADIUS_DB_NAME: ${RADIUS_DB_NAME}
      RADIUS_DB_USER: ${RADIUS_DB_USER}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD}
      RADIUS_SHARED_SECRET: ${RADIUS_SHARED_SECRET}
      RADIUS_CLIENT_NAME: ${RADIUS_CLIENT_NAME}
      RADIUS_CLIENT_IPADDR: ${RADIUS_CLIENT_IPADDR}
      RADIUS_CLIENT_SHORTNAME: ${RADIUS_CLIENT_SHORTNAME}
      RADIUS_NAS_TYPE: ${RADIUS_NAS_TYPE:-mikrotik}
    volumes:
      - radius-logs:/var/log/freeradius
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  wireguard:
    container_name: wireguard
    image: lscr.io/linuxserver/wireguard:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
    environment:
      PUID: ${WIREGUARD_PUID:-1000}
      PGID: ${WIREGUARD_PGID:-1000}
      TZ: ${TZ:-Africa/Nairobi}
      SERVERURL: ${WIREGUARD_SERVER_URL}
      SERVERPORT: ${WIREGUARD_SERVER_PORT:-51820}
      PEERS: ${WIREGUARD_PEERS:-rb951}
      PEERDNS: ${WIREGUARD_PEER_DNS:-1.1.1.1}
      INTERNAL_SUBNET: ${WIREGUARD_INTERNAL_SUBNET:-10.13.13.0}
      ALLOWEDIPS: ${WIREGUARD_ALLOWED_IPS:-10.13.13.0/24,10.20.0.0/24}
      PERSISTENTKEEPALIVE_PEERS: ${WIREGUARD_KEEPALIVE_PEERS:-rb951}
    volumes:
      - wireguard-config:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  radius-db-data:
  radius-logs:
  wireguard-config:
